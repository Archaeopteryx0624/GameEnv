<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STELLAR DOMINION</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/libs/css/fa.min.css">
<script src="/libs/js/gsap.min.js"></script>
<script src="/libs/js/howler.min.js"></script>
<style>
  :root {
    --player: #00ff88;
    --enemy: #ff3355;
    --neutral: #ffcc00;
    --bg: #01020a;
    --panel-bg: rgba(4, 10, 28, 0.92);
    --panel-border: rgba(0, 200, 255, 0.25);
    --accent: #00cfff;
    --accent2: #7b2fff;
    --text: #c8deff;
    --dim: #4a5f80;
    --warn: #ff9900;
    --font-head: 'Orbitron', monospace;
    --font-body: 'Rajdhani', sans-serif;
    --glow-player: 0 0 12px #00ff88, 0 0 28px #00ff8844;
    --glow-enemy: 0 0 12px #ff3355, 0 0 28px #ff335544;
    --glow-neutral: 0 0 12px #ffcc00, 0 0 28px #ffcc0044;
    --glow-accent: 0 0 12px #00cfff, 0 0 28px #00cfff44;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: var(--font-body);
    color: var(--text);
    overflow: hidden;
    user-select: none;
    width: 100vw; height: 100vh;
  }
  #gameCanvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    cursor: crosshair;
  }
  /* ===== HUD ===== */
  #hud {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }
  .hud-panel {
    position: absolute;
    pointer-events: all;
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    backdrop-filter: blur(12px);
    border-radius: 8px;
  }
  /* Top left stats */
  #stats-panel {
    top: 14px; left: 14px;
    padding: 12px 16px;
    min-width: 200px;
  }
  #stats-panel h2 {
    font-family: var(--font-head);
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 10px;
    text-shadow: var(--glow-accent);
  }
  .stat-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px;
    font-size: 13px;
    font-weight: 500;
  }
  .stat-row i { width: 16px; text-align: center; font-size: 11px; }
  .stat-val { margin-left: auto; font-family: var(--font-head); font-size: 12px; color: #fff; }
  .stat-row.res i { color: #ffd700; }
  .stat-row.res .stat-val { color: #ffd700; }
  /* Resources bar */
  #res-panel {
    top: 14px; left: 50%;
    transform: translateX(-50%);
    padding: 8px 20px;
    display: flex; gap: 24px; align-items: center;
  }
  .res-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600;
  }
  .res-item i { font-size: 13px; }
  .res-item.metal i { color: #a0c4ff; }
  .res-item.crystal i { color: #da77ff; }
  .res-item .rval { font-family: var(--font-head); font-size: 13px; }
  /* Top right */
  #actions-panel {
    top: 14px; right: 14px;
    padding: 12px 16px;
    min-width: 190px;
  }
  #actions-panel h2 {
    font-family: var(--font-head); font-size: 11px;
    letter-spacing: 3px; color: var(--accent);
    margin-bottom: 10px; text-shadow: var(--glow-accent);
  }
  .action-btn {
    display: block; width: 100%; margin-bottom: 6px;
    background: rgba(0,207,255,0.08);
    border: 1px solid rgba(0,207,255,0.3);
    color: var(--text); font-family: var(--font-body);
    font-size: 12px; font-weight: 600;
    padding: 7px 10px; border-radius: 5px;
    cursor: pointer; letter-spacing: 1px;
    transition: all 0.2s;
    pointer-events: all;
  }
  .action-btn:hover { background: rgba(0,207,255,0.2); border-color: var(--accent); color: #fff; }
  .action-btn i { margin-right: 6px; }
  .action-btn.danger { border-color: rgba(255,51,85,0.4); background: rgba(255,51,85,0.08); }
  .action-btn.danger:hover { background: rgba(255,51,85,0.2); border-color: var(--enemy); }
  .action-btn.success { border-color: rgba(0,255,136,0.4); background: rgba(0,255,136,0.08); }
  .action-btn.success:hover { background: rgba(0,255,136,0.2); border-color: var(--player); }
  /* AI status */
  #ai-status {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--panel-border);
    font-size: 11px; color: var(--dim);
  }
  #ai-strategy { color: var(--enemy); font-weight: 600; }
  /* Bottom HUD */
  #bottom-bar {
    bottom: 14px; left: 50%;
    transform: translateX(-50%);
    padding: 8px 18px;
    font-size: 12px; color: var(--dim);
    display: flex; gap: 20px; align-items: center;
    pointer-events: none;
  }
  .hint { display: flex; align-items: center; gap: 5px; }
  .key {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 3px; padding: 1px 5px;
    font-family: var(--font-head); font-size: 9px;
    color: var(--text);
  }
  /* Info Panel */
  #info-panel {
    bottom: 70px; right: 14px;
    width: 280px; max-height: 480px;
    overflow-y: auto;
    padding: 16px;
    display: none;
  }
  #info-panel.visible { display: block; }
  #info-panel h3 {
    font-family: var(--font-head); font-size: 13px;
    letter-spacing: 2px; margin-bottom: 4px;
  }
  #info-panel .owner-tag {
    font-size: 11px; font-weight: 600; letter-spacing: 2px;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .info-section { margin-bottom: 12px; }
  .info-section h4 {
    font-family: var(--font-head); font-size: 9px;
    letter-spacing: 2px; color: var(--dim);
    margin-bottom: 6px; text-transform: uppercase;
  }
  .info-row {
    display: flex; justify-content: space-between;
    font-size: 12px; margin-bottom: 3px;
  }
  .info-row .lbl { color: var(--dim); }
  .info-row .val { color: #fff; font-weight: 500; }
  .bar-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 2px; height: 4px; margin-bottom: 8px; overflow: hidden;
  }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .bar-fill.health { background: var(--player); }
  .bar-fill.atk { background: var(--enemy); }
  /* Build Queue */
  #build-section { margin-top: 10px; }
  .build-btn {
    display: inline-block; margin: 2px;
    background: rgba(0,207,255,0.08);
    border: 1px solid rgba(0,207,255,0.25);
    color: var(--text); font-family: var(--font-body);
    font-size: 11px; padding: 4px 8px;
    border-radius: 4px; cursor: pointer;
    transition: all 0.15s; pointer-events: all;
  }
  .build-btn:hover { background: rgba(0,207,255,0.2); color: #fff; }
  .build-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .queue-item {
    display: flex; justify-content: space-between;
    align-items: center; font-size: 11px;
    padding: 3px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .queue-progress {
    background: rgba(0,207,255,0.15);
    border-radius: 2px; overflow: hidden; height: 3px;
    margin-top: 2px;
  }
  .queue-prog-fill { height: 100%; background: var(--accent); }
  /* Fleet controls */
  #fleet-controls {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
  }
  .fleet-btn {
    flex: 1 1 calc(50% - 4px);
    background: rgba(0,207,255,0.08);
    border: 1px solid rgba(0,207,255,0.25);
    color: var(--text); font-family: var(--font-body);
    font-size: 11px; padding: 5px 4px;
    border-radius: 4px; cursor: pointer; text-align: center;
    transition: all 0.15s; pointer-events: all;
  }
  .fleet-btn:hover { background: rgba(0,207,255,0.2); color: #fff; }
  .fleet-btn.fire-btn { border-color: rgba(255,153,0,0.4); }
  .fleet-btn.fire-btn:hover { background: rgba(255,153,0,0.2); }
  /* Notifications */
  #notif-container {
    position: absolute; top: 70px; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center;
    gap: 6px; pointer-events: none;
    z-index: 100;
  }
  .notif {
    background: rgba(4,10,28,0.9);
    border: 1px solid var(--panel-border);
    padding: 7px 18px; border-radius: 20px;
    font-size: 12px; font-weight: 600; letter-spacing: 1px;
    backdrop-filter: blur(8px);
    opacity: 0; transform: translateY(-10px);
  }
  /* Send fleet mode overlay */
  #send-mode-banner {
    position: absolute; top: 70px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255,153,0,0.15);
    border: 1px solid var(--warn);
    color: var(--warn);
    padding: 8px 24px; border-radius: 20px;
    font-family: var(--font-head); font-size: 12px;
    letter-spacing: 2px;
    display: none;
    pointer-events: none;
    z-index: 50;
    text-shadow: 0 0 8px var(--warn);
  }
  /* Battle overlay */
  #battle-overlay {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(4,10,28,0.97);
    border: 1px solid rgba(255,51,85,0.5);
    width: 360px; padding: 20px;
    border-radius: 10px;
    display: none;
    z-index: 200;
    backdrop-filter: blur(16px);
  }
  #battle-overlay h3 {
    font-family: var(--font-head); font-size: 13px;
    color: var(--enemy); letter-spacing: 3px;
    text-align: center; margin-bottom: 14px;
    text-shadow: var(--glow-enemy);
  }
  .battle-sides { display: flex; justify-content: space-between; gap: 14px; }
  .battle-side h4 {
    font-family: var(--font-head); font-size: 10px;
    letter-spacing: 2px; margin-bottom: 8px;
  }
  .battle-side.player h4 { color: var(--player); }
  .battle-side.enemy h4 { color: var(--enemy); }
  .battle-log {
    margin-top: 12px;
    font-size: 11px; line-height: 1.6;
    max-height: 100px; overflow-y: auto;
    color: var(--dim);
    border-top: 1px solid var(--panel-border);
    padding-top: 8px;
  }
  .battle-result {
    text-align: center; margin-top: 10px;
    font-family: var(--font-head); font-size: 14px;
    letter-spacing: 2px;
  }
  .win { color: var(--player); text-shadow: var(--glow-player); }
  .lose { color: var(--enemy); text-shadow: var(--glow-enemy); }
  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
  ::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }
  /* Speed controls */
  #speed-panel {
    bottom: 70px; left: 14px;
    padding: 10px 14px;
  }
  #speed-panel h4 {
    font-family: var(--font-head); font-size: 9px;
    letter-spacing: 2px; color: var(--dim); margin-bottom: 6px;
  }
  .speed-btns { display: flex; gap: 4px; }
  .sp-btn {
    padding: 4px 8px; border-radius: 3px; font-size: 10px;
    font-family: var(--font-head); cursor: pointer;
    border: 1px solid rgba(0,207,255,0.25);
    background: rgba(0,207,255,0.06);
    color: var(--dim); transition: all 0.15s;
    pointer-events: all;
  }
  .sp-btn.active, .sp-btn:hover { background: rgba(0,207,255,0.2); color: var(--accent); }
  #minimap {
    bottom: 70px; left: 14px;
    width: 140px; height: 100px;
    padding: 0; overflow: hidden;
    border-radius: 6px;
    display: none;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-panel" id="stats-panel">
    <h2><i class="fas fa-satellite"></i> COMMAND</h2>
    <div class="stat-row">
      <i class="fas fa-globe" style="color:var(--player)"></i>
      <span>Planets</span>
      <span class="stat-val" id="stat-planets">0</span>
    </div>
    <div class="stat-row">
      <i class="fas fa-meteor" style="color:#a0c4ff"></i>
      <span>Asteroids</span>
      <span class="stat-val" id="stat-asteroids">0</span>
    </div>
    <div class="stat-row">
      <i class="fas fa-rocket" style="color:var(--accent)"></i>
      <span>Fleets</span>
      <span class="stat-val" id="stat-fleets">0</span>
    </div>
    <div class="stat-row">
      <i class="fas fa-shield-halved" style="color:#7b2fff"></i>
      <span>Stations</span>
      <span class="stat-val" id="stat-stations">0</span>
    </div>
  </div>

  <div class="hud-panel" id="res-panel">
    <div class="res-item metal">
      <i class="fas fa-cubes"></i>
      <span style="color:var(--dim)">METAL</span>
      <span class="rval" id="res-metal">0</span>
    </div>
    <div style="width:1px;height:20px;background:var(--panel-border)"></div>
    <div class="res-item crystal">
      <i class="fas fa-gem"></i>
      <span style="color:var(--dim)">CRYSTAL</span>
      <span class="rval" id="res-crystal">0</span>
    </div>
    <div style="width:1px;height:20px;background:var(--panel-border)"></div>
    <div class="res-item" style="color:#ff9900">
      <i class="fas fa-bomb"></i>
      <span style="color:var(--dim)">MISSILES</span>
      <span class="rval" id="res-missiles">0</span>
    </div>
  </div>

  <div class="hud-panel" id="actions-panel">
    <h2><i class="fas fa-crosshairs"></i> ACTIONS</h2>
    <button class="action-btn success" onclick="game.selectMode='sendfleet'; showSendBanner()">
      <i class="fas fa-rocket"></i> SEND FLEET
    </button>
    <button class="action-btn" onclick="game.selectMode='mine'; showNotif('Select an asteroid to mine','#a0c4ff')">
      <i class="fas fa-hammer"></i> MINE ASTEROID
    </button>
    <button class="action-btn danger" onclick="game.selectMode='missile'; showNotif('Select a target for missile strike','#ff9900')">
      <i class="fas fa-bomb"></i> FIRE MISSILE
    </button>
    <button class="action-btn" onclick="game.selectMode='warpgate'; showNotif('Select a player planet for warp gate','#7b2fff')">
      <i class="fas fa-portal-exit"></i> WARP GATE
    </button>
    <div id="ai-status">
      AI: <span id="ai-strategy">EXPANDING</span> &nbsp;|&nbsp;
      Turn <span id="ai-turn">0</span>
    </div>
  </div>

  <div id="notif-container"></div>
  <div id="send-mode-banner"><i class="fas fa-rocket"></i> &nbsp; SELECT DESTINATION</div>

  <!-- Info Panel -->
  <div class="hud-panel" id="info-panel">
    <div id="info-content"></div>
  </div>

  <!-- Speed -->
  <div class="hud-panel" id="speed-panel">
    <h4>GAME SPEED</h4>
    <div class="speed-btns">
      <button class="sp-btn" onclick="setSpeed(0.5)" id="spd-half">×½</button>
      <button class="sp-btn active" onclick="setSpeed(1)" id="spd-1">×1</button>
      <button class="sp-btn" onclick="setSpeed(2)" id="spd-2">×2</button>
      <button class="sp-btn" onclick="setSpeed(3)" id="spd-3">×3</button>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="hud-panel" id="bottom-bar">
    <div class="hint"><span class="key">CLICK</span> Select object</div>
    <div class="hint"><span class="key">S</span> Send fleet</div>
    <div class="hint"><span class="key">M</span> Mine</div>
    <div class="hint"><span class="key">B</span> Build ships</div>
    <div class="hint"><span class="key">ESC</span> Deselect</div>
  </div>

  <!-- Battle Overlay -->
  <div id="battle-overlay">
    <h3><i class="fas fa-bolt"></i> SPACE BATTLE</h3>
    <div class="battle-sides">
      <div class="battle-side player">
        <h4>PLAYER FORCES</h4>
        <div id="battle-player-ships"></div>
      </div>
      <div class="battle-side enemy">
        <h4>ENEMY FORCES</h4>
        <div id="battle-enemy-ships"></div>
      </div>
    </div>
    <div class="battle-log" id="battle-log"></div>
    <div class="battle-result" id="battle-result"></div>
  </div>
</div>

<script>
// ================================================================
// STELLAR DOMINION — Complete Space Strategy Game
// ================================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  G.stars = generateStars(350);
});

// ============================================================
// SHIP TYPES
// ============================================================
const SHIP_TYPES = {
  Scout:       { hp:30,  atk:8,   def:3,  speed:3.2, cost:{metal:60,crystal:20},   buildTime:6,  range:280, color:'#00cfff', icon:'⬡' },
  Fighter:     { hp:60,  atk:18,  def:8,  speed:2.4, cost:{metal:120,crystal:40},  buildTime:10, range:220, color:'#00ff88', icon:'▶' },
  Destroyer:   { hp:140, atk:34,  def:18, speed:1.8, cost:{metal:260,crystal:90},  buildTime:18, range:200, color:'#ffd700', icon:'◆' },
  Dreadnought: { hp:400, atk:80,  def:50, speed:1.0, cost:{metal:700,crystal:280}, buildTime:45, range:280, color:'#ff6600', icon:'★' },
  Miner:       { hp:40,  atk:2,   def:4,  speed:1.6, cost:{metal:90,crystal:60},   buildTime:12, range:600, color:'#a0c4ff', icon:'◉' },
  Missile:     { hp:10,  atk:120, def:0,  speed:5.5, cost:{metal:40,crystal:80},   buildTime:5,  range:9999,color:'#ff3355', icon:'↑' },
};

// ============================================================
// GAME STATE
// ============================================================
const G = {
  planets: [],
  asteroids: [],
  fleets: [],
  missiles: [],
  stars: [],
  selectedObj: null,
  selectMode: 'normal',   // normal | sendfleet | mine | missile | warpgate
  sourceFleet: null,
  sourcePlanet: null,
  aiTimer: 0,
  aiTurn: 0,
  aiStrategy: 'EXPAND',
  tick: 0,
  speed: 1,
  playerMetal: 40000,
  playerCrystal: 20000,
  playerMissiles: 30,
  gameOver: false,
};

// ============================================================
// GENERATION
// ============================================================
function rnd(min, max) { return Math.random() * (max - min) + min; }
function rndInt(min, max) { return Math.floor(rnd(min, max + 1)); }
function dist(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }

function generateStars(n) {
  return Array.from({ length: n }, () => ({
    x: rnd(0, canvas.width), y: rnd(0, canvas.height),
    r: rnd(0.4, 2.0), brightness: rnd(0.3, 1.0),
    twinkle: rnd(0, Math.PI * 2)
  }));
}

function generatePlanets() {
  const W = canvas.width, H = canvas.height;
  const names = ['Kepler','Solus','Vega','Orion','Lyra','Cygnus','Draco','Hydra','Sirius','Altair','Rigel','Antares','Arcturus','Procyon','Capella'];
  const positions = [
    [W*0.12, H*0.3],[W*0.22, H*0.7],[W*0.38, H*0.18],[W*0.52, H*0.5],[W*0.65, H*0.2],
    [W*0.78, H*0.65],[W*0.88, H*0.3],[W*0.45, H*0.8],[W*0.7, H*0.85],[W*0.15, H*0.8],
  ];
  positions.forEach(([x, y], i) => {
    const owner = i === 0 ? 'player' : i === 1 ? 'player' : i <= 3 ? 'neutral' : i <= 6 ? 'enemy' : 'neutral';
    G.planets.push({
      type: 'planet', id: 'p' + i,
      name: names[i], x, y,
      owner,
      radius: rndInt(22, 38),
      population: rndInt(100, 500),
      defenses: rndInt(0, owner === 'enemy' ? 60 : 30),
      metal: rndInt(100, 400),
      crystal: rndInt(50, 200),
      metalRate: rndInt(8, 25),
      crystalRate: rndInt(4, 14),
      shipyard: owner !== 'neutral',
      warpGate: false,
      defenseStations: owner === 'enemy' ? [createStation(x, y, 'enemy')] : [],
      buildQueue: [],
      orbitingFleets: [],
      missileStock: owner === 'player' ? rndInt(1, 3) : rndInt(0, 2),
      color: rndColor(),
      angle: rnd(0, Math.PI * 2),
    });
  });
}

function generateAsteroids() {
  const W = canvas.width, H = canvas.height;
  const aPositions = [
    [W*0.32, H*0.42],[W*0.6, H*0.55],[W*0.25, H*0.55],[W*0.75, H*0.4],[W*0.5, H*0.3],[W*0.85, H*0.5],
  ];
  aPositions.forEach(([x, y], i) => {
    G.asteroids.push({
      type: 'asteroid', id: 'a' + i,
      name: 'Asteroid ' + String.fromCharCode(65 + i),
      x, y, owner: 'neutral',
      metal: rndInt(300, 900),
      crystal: rndInt(150, 500),
      radius: rndInt(14, 22),
      angle: rnd(0, Math.PI * 2),
      orbitingFleets: [],
      isMining: false,
      defenseStations: [],
    });
  });
}

function rndColor() {
  const cols = ['#4477ff','#44aaff','#ff7744','#ff44aa','#aa44ff','#44ffaa'];
  return cols[rndInt(0, cols.length - 1)];
}

function createStation(px, py, owner) {
  const angle = rnd(0, Math.PI * 2);
  const orbitR = rndInt(50, 80);
  return {
    owner, hp: 180, maxHp: 180,
    atk: 28, cooldown: 0,
    angle, orbitR, orbitSpeed: 0.006,
    x: px + Math.cos(angle) * orbitR,
    y: py + Math.sin(angle) * orbitR,
    parentX: px, parentY: py,
    fireTimer: 0,
    laserTarget: null, laserAlpha: 0,
  };
}

// Initial player fleet
function spawnPlayerFleet() {
  const p = G.planets[0];
  const fleet = createFleet('player', p.x, p.y, { Fighter: 3, Scout: 2 });
  p.orbitingFleets.push(fleet);
  G.fleets.push(fleet);
}

function createFleet(owner, x, y, ships) {
  return {
    type: 'fleet', id: 'f' + Date.now() + Math.random(),
    owner, x, y,
    ships: { ...ships },
    traveling: false,
    targetX: x, targetY: y,
    targetObj: null,
    progress: 0,
    startX: x, startY: y,
    speed: 1.5,
    trail: [],
  };
}

// ============================================================
// STAR RENDERING
// ============================================================
function drawStars(t) {
  G.stars.forEach(s => {
    const alpha = s.brightness * (0.6 + 0.4 * Math.sin(s.twinkle + t * 0.001));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.fill();
  });
}

function drawNebula() {
  // Static nebula glow in background
  const grad1 = ctx.createRadialGradient(canvas.width*0.3, canvas.height*0.4, 0, canvas.width*0.3, canvas.height*0.4, 350);
  grad1.addColorStop(0, 'rgba(50,20,100,0.12)');
  grad1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad1; ctx.fillRect(0,0,canvas.width,canvas.height);

  const grad2 = ctx.createRadialGradient(canvas.width*0.7, canvas.height*0.6, 0, canvas.width*0.7, canvas.height*0.6, 280);
  grad2.addColorStop(0, 'rgba(0,60,80,0.10)');
  grad2.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad2; ctx.fillRect(0,0,canvas.width,canvas.height);
}

// ============================================================
// PLANET RENDERING
// ============================================================
function ownerColor(owner) {
  if (owner === 'player') return '#00ff88';
  if (owner === 'enemy') return '#ff3355';
  return '#ffcc00';
}

function drawPlanets(t) {
  G.planets.forEach(pl => {
    const oc = ownerColor(pl.owner);
    pl.angle += 0.002 * G.speed;

    // Glow
    const grd = ctx.createRadialGradient(pl.x, pl.y, 0, pl.x, pl.y, pl.radius * 2.5);
    grd.addColorStop(0, oc + '22');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(pl.x, pl.y, pl.radius * 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Planet body
    const pGrd = ctx.createRadialGradient(pl.x - pl.radius*0.3, pl.y - pl.radius*0.3, 0, pl.x, pl.y, pl.radius);
    pGrd.addColorStop(0, lighten(pl.color, 60));
    pGrd.addColorStop(0.6, pl.color);
    pGrd.addColorStop(1, darken(pl.color, 60));
    ctx.beginPath();
    ctx.arc(pl.x, pl.y, pl.radius, 0, Math.PI * 2);
    ctx.fillStyle = pGrd;
    ctx.fill();

    // Atmosphere rim
    ctx.beginPath();
    ctx.arc(pl.x, pl.y, pl.radius + 2, 0, Math.PI * 2);
    ctx.strokeStyle = oc + '88';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Orbit ring
    if (pl.owner !== 'neutral') {
      ctx.beginPath();
      ctx.arc(pl.x, pl.y, pl.radius + 14, 0, Math.PI * 2);
      ctx.strokeStyle = oc + '30';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 8]);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Selection ring
    if (G.selectedObj === pl) {
      ctx.beginPath();
      ctx.arc(pl.x, pl.y, pl.radius + 22, 0, Math.PI * 2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.6 + 0.4 * Math.sin(t * 0.004);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Name label
    ctx.font = `600 11px 'Rajdhani'`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(pl.name, pl.x, pl.y + pl.radius + 16);

    // Owner dot
    ctx.beginPath();
    ctx.arc(pl.x, pl.y - pl.radius - 8, 4, 0, Math.PI * 2);
    ctx.fillStyle = oc;
    ctx.fill();

    // Warp gate indicator
    if (pl.warpGate) {
      ctx.beginPath();
      ctx.arc(pl.x, pl.y, pl.radius + 28, 0, Math.PI * 2);
      ctx.strokeStyle = '#7b2fff88';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 6]);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.font = `10px 'Orbitron'`;
      ctx.fillStyle = '#7b2fff';
      ctx.fillText('⬡', pl.x + pl.radius + 28, pl.y - 4);
    }

    // Defense stations
    pl.defenseStations.forEach(st => drawStation(st, t));

    // Orbiting fleet dots
    pl.orbitingFleets.forEach((fl, idx) => {
      const a = t * 0.001 + idx * (Math.PI * 2 / pl.orbitingFleets.length);
      const r = pl.radius + 32 + idx * 10;
      const fx = pl.x + Math.cos(a) * r;
      const fy = pl.y + Math.sin(a) * r;
      fl.x = fx; fl.y = fy;
      ctx.beginPath();
      ctx.arc(fx, fy, 4, 0, Math.PI * 2);
      ctx.fillStyle = ownerColor(fl.owner);
      ctx.fill();
      const cnt = shipCount(fl);
      ctx.font = `500 9px 'Rajdhani'`;
      ctx.fillStyle = '#fff';
      ctx.fillText(cnt, fx + 6, fy + 3);
    });

    // Build queue progress ring
    if (pl.buildQueue.length > 0 && pl.owner === 'player') {
      const bq = pl.buildQueue[0];
      const prog = bq.elapsed / bq.total;
      ctx.beginPath();
      ctx.arc(pl.x, pl.y, pl.radius + 5, -Math.PI/2, -Math.PI/2 + prog * Math.PI * 2);
      ctx.strokeStyle = '#00cfff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  });
}

function drawStation(st, t) {
  st.angle += st.orbitSpeed * G.speed;
  st.x = st.parentX + Math.cos(st.angle) * st.orbitR;
  st.y = st.parentY + Math.sin(st.angle) * st.orbitR;

  // Station body
  ctx.save();
  ctx.translate(st.x, st.y);
  ctx.rotate(st.angle * 2);
  ctx.beginPath();
  for (let i = 0; i < 4; i++) {
    const a = i * Math.PI / 2;
    const r = 8;
    ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    ctx.lineTo(Math.cos(a + Math.PI/4) * r * 0.5, Math.sin(a + Math.PI/4) * r * 0.5);
  }
  ctx.strokeStyle = ownerColor(st.owner);
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, 5, 0, Math.PI * 2);
  ctx.fillStyle = ownerColor(st.owner) + '99';
  ctx.fill();
  ctx.restore();

  // HP bar
  const hpFrac = st.hp / st.maxHp;
  ctx.fillStyle = '#333'; ctx.fillRect(st.x - 10, st.y + 10, 20, 3);
  ctx.fillStyle = hpFrac > 0.5 ? '#00ff88' : '#ff9900';
  ctx.fillRect(st.x - 10, st.y + 10, 20 * hpFrac, 3);

  // Laser
  if (st.laserAlpha > 0 && st.laserTarget) {
    ctx.beginPath();
    ctx.moveTo(st.x, st.y);
    ctx.lineTo(st.laserTarget.x, st.laserTarget.y);
    ctx.strokeStyle = `rgba(255,50,50,${st.laserAlpha})`;
    ctx.lineWidth = 2;
    ctx.stroke();
    st.laserAlpha -= 0.05 * G.speed;
  }
}

// ============================================================
// ASTEROID RENDERING
// ============================================================
function drawAsteroids(t) {
  G.asteroids.forEach(ast => {
    ast.angle += 0.004 * G.speed;
    const oc = ownerColor(ast.owner);

    ctx.save();
    ctx.translate(ast.x, ast.y);
    ctx.rotate(ast.angle);

    // Asteroid body (rough polygon)
    ctx.beginPath();
    const pts = 8;
    for (let i = 0; i < pts; i++) {
      const a = (i / pts) * Math.PI * 2;
      const fuzz = ast.radius * (0.8 + 0.2 * Math.sin(i * 3.7));
      if (i === 0) ctx.moveTo(Math.cos(a) * fuzz, Math.sin(a) * fuzz);
      else ctx.lineTo(Math.cos(a) * fuzz, Math.sin(a) * fuzz);
    }
    ctx.closePath();
    ctx.fillStyle = '#3d3d4e';
    ctx.fill();
    ctx.strokeStyle = '#7070aa';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();

    // Owner
    ctx.beginPath();
    ctx.arc(ast.x, ast.y - ast.radius - 8, 4, 0, Math.PI * 2);
    ctx.fillStyle = oc;
    ctx.fill();

    // Mining beam
    if (ast.isMining) {
      ctx.beginPath();
      ctx.arc(ast.x, ast.y, ast.radius + 10 + 4 * Math.sin(t * 0.01), 0, Math.PI * 2);
      ctx.strokeStyle = '#a0c4ff66';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    // Name
    ctx.font = `500 10px 'Rajdhani'`;
    ctx.fillStyle = '#aaa';
    ctx.textAlign = 'center';
    ctx.fillText(ast.name, ast.x, ast.y + ast.radius + 14);

    // Resource mini-indicators
    ctx.font = `9px 'Rajdhani'`;
    ctx.fillStyle = '#a0c4ff';
    ctx.fillText('M:' + Math.floor(ast.metal), ast.x - 18, ast.y + ast.radius + 24);
    ctx.fillStyle = '#da77ff';
    ctx.fillText('C:' + Math.floor(ast.crystal), ast.x + 18, ast.y + ast.radius + 24);

    // Selection ring
    if (G.selectedObj === ast) {
      ctx.beginPath();
      ctx.arc(ast.x, ast.y, ast.radius + 18, 0, Math.PI * 2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = 0.6 + 0.4 * Math.sin(t * 0.004);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Defense stations on asteroids
    ast.defenseStations.forEach(st => drawStation(st, t));
  });
}

// ============================================================
// FLEET RENDERING
// ============================================================
function drawFleets(t) {
  G.fleets.forEach(fl => {
    if (!fl.traveling) return;
    const oc = ownerColor(fl.owner);
    const dx = fl.targetX - fl.startX;
    const dy = fl.targetY - fl.startY;
    const angle = Math.atan2(dy, dx);

    // Trail
    fl.trail.push({ x: fl.x, y: fl.y });
    if (fl.trail.length > 18) fl.trail.shift();
    for (let i = 0; i < fl.trail.length - 1; i++) {
      const alpha = (i / fl.trail.length) * 0.4;
      ctx.beginPath();
      ctx.moveTo(fl.trail[i].x, fl.trail[i].y);
      ctx.lineTo(fl.trail[i + 1].x, fl.trail[i + 1].y);
      ctx.strokeStyle = oc.replace(')', `,${alpha})`).replace('rgb', 'rgba');
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Fleet arrow
    ctx.save();
    ctx.translate(fl.x, fl.y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(12, 0);
    ctx.lineTo(-8, -6);
    ctx.lineTo(-4, 0);
    ctx.lineTo(-8, 6);
    ctx.closePath();
    ctx.fillStyle = oc;
    ctx.shadowColor = oc;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.restore();

    // Ship count
    const cnt = shipCount(fl);
    ctx.font = `600 10px 'Rajdhani'`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(cnt, fl.x, fl.y - 14);
  });
}

// ============================================================
// MISSILE RENDERING
// ============================================================
function drawMissiles(t) {
  G.missiles.forEach(ms => {
    const trail = ms.trail || [];
    trail.push({ x: ms.x, y: ms.y });
    if (trail.length > 12) trail.shift();
    ms.trail = trail;
    for (let i = 0; i < trail.length - 1; i++) {
      const a = (i / trail.length) * 0.7;
      ctx.beginPath();
      ctx.moveTo(trail[i].x, trail[i].y);
      ctx.lineTo(trail[i+1].x, trail[i+1].y);
      ctx.strokeStyle = `rgba(255,80,0,${a})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(ms.x, ms.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#ff5500';
    ctx.shadowColor = '#ff3300';
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

// ============================================================
// UPDATE LOOP
// ============================================================
function updateFleets(dt) {
  G.fleets.forEach(fl => {
    if (!fl.traveling) return;
    const spd = SHIP_TYPES.Fighter.speed * G.speed * dt * 0.06;
    const dx = fl.targetX - fl.x;
    const dy = fl.targetY - fl.y;
    const d = Math.hypot(dx, dy);
    if (d < 8) {
      fl.x = fl.targetX; fl.y = fl.targetY;
      fl.traveling = false;
      fl.trail = [];
      arriveFleet(fl);
    } else {
      fl.x += (dx / d) * spd;
      fl.y += (dy / d) * spd;
    }
  });
}

function arriveFleet(fl) {
  const target = fl.targetObj;
  if (!target) return;
  // Combat or capture
  if (target.owner !== fl.owner && target.owner !== 'neutral') {
    startBattle(fl, target);
  } else if (target.owner === 'neutral') {
    // Capture neutral
    target.owner = fl.owner;
    if (target.type === 'planet') {
      target.orbitingFleets.push(fl);
      if (fl.owner === 'player') showNotif(`${target.name} captured!`, '#00ff88');
      else showNotif(`Enemy captured ${target.name}!`, '#ff3355');
    } else {
      target.orbitingFleets.push(fl);
      if (fl.owner === 'player') showNotif(`${target.name} claimed!`, '#00ff88');
    }
  } else {
    // Friendly orbit
    target.orbitingFleets.push(fl);
  }
  G.fleets = G.fleets.filter(f => f !== fl);
}

function updateMissiles(dt) {
  G.missiles = G.missiles.filter(ms => {
    const dx = ms.targetX - ms.x;
    const dy = ms.targetY - ms.y;
    const d = Math.hypot(dx, dy);
    const spd = SHIP_TYPES.Missile.speed * G.speed * dt * 0.08;
    if (d < 12) {
      // Impact
      missileImpact(ms);
      spawnExplosion(ms.x, ms.y);
      return false;
    }
    ms.x += (dx / d) * spd;
    ms.y += (dy / d) * spd;
    return true;
  });
}

function missileImpact(ms) {
  const target = ms.targetObj;
  if (!target) return;
  target.defenses = Math.max(0, (target.defenses || 0) - 60);
  target.defenseStations = target.defenseStations.filter(st => {
    st.hp -= 80;
    return st.hp > 0;
  });
  // Damage orbiting fleets
  target.orbitingFleets.forEach(fl => {
    if (fl.owner !== ms.owner) {
      const keys = Object.keys(fl.ships);
      if (keys.length) {
        const k = keys[0];
        fl.ships[k] = Math.max(0, fl.ships[k] - 2);
        if (fl.ships[k] <= 0) delete fl.ships[k];
      }
    }
  });
  if (ms.owner === 'player') showNotif('Missile impact!', '#ff9900');
}

// Explosions
const explosions = [];
function spawnExplosion(x, y) {
  explosions.push({ x, y, r: 5, alpha: 1, maxR: 45 });
}
function drawExplosions() {
  explosions.forEach((ex, i) => {
    ex.r += 3 * G.speed;
    ex.alpha -= 0.04 * G.speed;
    if (ex.alpha <= 0) { explosions.splice(i, 1); return; }
    const grd = ctx.createRadialGradient(ex.x, ex.y, 0, ex.x, ex.y, ex.r);
    grd.addColorStop(0, `rgba(255,200,50,${ex.alpha})`);
    grd.addColorStop(0.5, `rgba(255,80,0,${ex.alpha * 0.6})`);
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
  });
}

function updateDefenseStations(dt) {
  const allObj = [...G.planets, ...G.asteroids];
  allObj.forEach(obj => {
    obj.defenseStations.forEach(st => {
      // Find nearest enemy fleet
      let nearest = null, nearD = 220;
      G.fleets.forEach(fl => {
        if (fl.owner !== st.owner) {
          const d = dist(st, fl);
          if (d < nearD) { nearD = d; nearest = fl; }
        }
      });
      // Also check orbiting fleets on this object
      if (!nearest) {
        obj.orbitingFleets.forEach(fl => {
          if (fl.owner !== st.owner) { nearest = fl; }
        });
      }
      st.fireTimer -= dt * G.speed;
      if (nearest && st.fireTimer <= 0) {
        st.fireTimer = 60;
        st.laserTarget = nearest;
        st.laserAlpha = 1;
        // Damage fleet
        const keys = Object.keys(nearest.ships);
        if (keys.length) {
          const k = keys[Math.floor(Math.random() * keys.length)];
          nearest.ships[k]--;
          if (nearest.ships[k] <= 0) delete nearest.ships[k];
        }
        if (Object.keys(nearest.ships).length === 0) {
          G.fleets = G.fleets.filter(f => f !== nearest);
          nearest.traveling = false;
        }
      }
    });
  });
}

function updateResources(dt) {
  if (G.tick % (Math.floor(120 / G.speed)) !== 0) return;
  G.planets.filter(p => p.owner === 'player').forEach(p => {
    G.playerMetal += p.metalRate;
    G.playerCrystal += p.crystalRate;
    p.metal += p.metalRate;
    p.crystal += p.crystalRate;
  });
}

function updateBuildQueues(dt) {
  G.planets.forEach(pl => {
    if (!pl.buildQueue.length) return;
    const bq = pl.buildQueue[0];
    bq.elapsed += dt * G.speed;
    if (bq.elapsed >= bq.total) {
      pl.buildQueue.shift();
      completeBuild(pl, bq);
    }
  });
}

function completeBuild(pl, bq) {
  if (bq.type === 'Missile') {
    pl.missileStock = (pl.missileStock || 0) + 1;
    if (pl.owner === 'player') {
      G.playerMissiles++;
      showNotif('Missile ready!', '#ff9900');
    }
    return;
  }
  if (bq.type === 'DefenseStation') {
    pl.defenseStations.push(createStation(pl.x, pl.y, pl.owner));
    if (pl.owner === 'player') showNotif('Defense station online!', '#7b2fff');
    return;
  }
  const newFleet = createFleet(pl.owner, pl.x, pl.y, { [bq.type]: bq.count });
  pl.orbitingFleets.push(newFleet);
  G.fleets.push(newFleet);
  if (pl.owner === 'player') showNotif(`${bq.type} built!`, '#00ff88');

  // Enemy joins orbiting
  if (pl.owner === 'enemy') {
    // Will be used by AI
  }
}

// ============================================================
// MINING
// ============================================================
function instantMine(asteroid) {
  const metal = Math.min(asteroid.metal, 120);
  const crystal = Math.min(asteroid.crystal, 60);
  asteroid.metal -= metal;
  asteroid.crystal -= crystal;
  G.playerMetal += metal;
  G.playerCrystal += crystal;
  showNotif(`Mined: +${Math.floor(metal)} Metal, +${Math.floor(crystal)} Crystal`, '#a0c4ff');
  if (asteroid.metal <= 0 && asteroid.crystal <= 0) {
    showNotif(`${asteroid.name} depleted!`, '#ffcc00');
  }
}

function sendMinerFleet(planet, asteroid) {
  const hasMiners = planet.orbitingFleets.some(fl => fl.ships.Miner > 0);
  if (!hasMiners) {
    showNotif('No miner ships orbiting!', '#ff9900');
    return;
  }
  // Use warp gate if available
  const fl = planet.orbitingFleets.find(fl => fl.ships.Miner > 0);
  planet.orbitingFleets = planet.orbitingFleets.filter(f => f !== fl);

  if (planet.warpGate) {
    fl.x = asteroid.x;
    fl.y = asteroid.y;
    fl.traveling = false;
    startMining(fl, asteroid, planet);
    showNotif('Warp gate teleport!', '#7b2fff');
  } else {
    fl.traveling = true;
    fl.startX = fl.x; fl.startY = fl.y;
    fl.targetX = asteroid.x; fl.targetY = asteroid.y;
    fl.targetObj = asteroid;
    fl.miningTarget = asteroid;
    fl.miningHome = planet;
    asteroid.isMining = true;
    G.fleets.push(fl);
  }
}

function startMining(fl, asteroid, home) {
  asteroid.isMining = true;
  const metal = Math.min(asteroid.metal, 180);
  const crystal = Math.min(asteroid.crystal, 90);
  asteroid.metal -= metal;
  asteroid.crystal -= crystal;
  G.playerMetal += metal;
  G.playerCrystal += crystal;
  showNotif(`Mining complete! +${Math.floor(metal)}M +${Math.floor(crystal)}C`, '#a0c4ff');
  setTimeout(() => { asteroid.isMining = false; }, 3000);
  // Return fleet
  fl.traveling = true;
  fl.startX = fl.x; fl.startY = fl.y;
  fl.targetX = home.x; fl.targetY = home.y;
  fl.targetObj = home;
  G.fleets.push(fl);
}

// ============================================================
// BATTLE SYSTEM
// ============================================================
function startBattle(attackFleet, target) {
  const log = [];
  let playerShips = {};
  let enemyShips = {};

  if (attackFleet.owner === 'player') {
    playerShips = { ...attackFleet.ships };
    // Collect defending enemy ships
    target.orbitingFleets.filter(f => f.owner === 'enemy').forEach(fl => {
      Object.entries(fl.ships).forEach(([k, v]) => {
        enemyShips[k] = (enemyShips[k] || 0) + v;
      });
    });
    enemyShips['Defense'] = Math.ceil((target.defenses || 0) / 20);
    if (enemyShips['Defense'] <= 0) delete enemyShips['Defense'];
  } else {
    enemyShips = { ...attackFleet.ships };
    target.orbitingFleets.filter(f => f.owner === 'player').forEach(fl => {
      Object.entries(fl.ships).forEach(([k, v]) => {
        playerShips[k] = (playerShips[k] || 0) + v;
      });
    });
    playerShips['Defense'] = Math.ceil((target.defenses || 0) / 20);
  }

  // Simulate rounds
  let round = 0;
  const maxRounds = 20;
  while (round < maxRounds && shipTotal(playerShips) > 0 && shipTotal(enemyShips) > 0) {
    const pAtk = calcFleetAtk(playerShips);
    const eAtk = calcFleetAtk(enemyShips);
    const eLosses = Math.max(1, Math.floor(pAtk / 30));
    const pLosses = Math.max(1, Math.floor(eAtk / 30));
    damageFleet(playerShips, pLosses);
    damageFleet(enemyShips, eLosses);
    log.push(`Round ${round + 1}: Player atk ${pAtk} | Enemy atk ${eAtk}`);
    round++;
  }

  const playerWon = shipTotal(playerShips) > 0;
  showBattleOverlay(playerShips, enemyShips, log, playerWon);

  if (playerWon) {
    target.owner = attackFleet.owner;
    target.defenses = 0;
    target.orbitingFleets = target.orbitingFleets.filter(f => f.owner === attackFleet.owner);
    attackFleet.ships = playerShips;
    delete attackFleet.ships['Defense'];
    target.orbitingFleets.push(attackFleet);
    if (attackFleet.owner === 'player') showNotif(`${target.name} conquered!`, '#00ff88');
    else showNotif(`Enemy took ${target.name}!`, '#ff3355');
  } else {
    target.defenses = Math.max(0, target.defenses - 30);
    showNotif('Attack repelled!', '#ffcc00');
  }
  G.fleets = G.fleets.filter(f => f !== attackFleet);
}

function calcFleetAtk(ships) {
  return Object.entries(ships).reduce((sum, [k, v]) => {
    const stat = SHIP_TYPES[k];
    return sum + (stat ? stat.atk * v : 15 * v);
  }, 0);
}

function damageFleet(ships, dmg) {
  let remaining = dmg;
  const keys = Object.keys(ships);
  while (remaining > 0 && keys.length > 0) {
    const k = keys[Math.floor(Math.random() * keys.length)];
    ships[k]--;
    if (ships[k] <= 0) {
      delete ships[k];
      keys.splice(keys.indexOf(k), 1);
    }
    remaining--;
  }
}

function shipTotal(ships) {
  return Object.values(ships).reduce((s, v) => s + v, 0);
}

function showBattleOverlay(playerShips, enemyShips, log, playerWon) {
  const overlay = document.getElementById('battle-overlay');
  document.getElementById('battle-player-ships').innerHTML =
    Object.entries(playerShips).map(([k, v]) => `<div class="queue-item"><span>${SHIP_TYPES[k]?.icon || '◈'} ${k}</span><span>${v}</span></div>`).join('');
  document.getElementById('battle-enemy-ships').innerHTML =
    Object.entries(enemyShips).map(([k, v]) => `<div class="queue-item"><span>${SHIP_TYPES[k]?.icon || '◈'} ${k}</span><span>${v}</span></div>`).join('');
  document.getElementById('battle-log').innerHTML = log.slice(-5).join('<br>');
  const res = document.getElementById('battle-result');
  res.className = 'battle-result ' + (playerWon ? 'win' : 'lose');
  res.textContent = playerWon ? '— VICTORY —' : '— DEFEAT —';
  overlay.style.display = 'block';
  gsap.fromTo(overlay, { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.3 });
  setTimeout(() => {
    gsap.to(overlay, { opacity: 0, scale: 0.95, duration: 0.3, onComplete: () => overlay.style.display = 'none' });
  }, 4000);
}

// ============================================================
// AI SYSTEM
// ============================================================
function runAI() {
  G.aiTurn++;
  document.getElementById('ai-turn').textContent = G.aiTurn;

  const enemyPlanets = G.planets.filter(p => p.owner === 'enemy');
  const neutralPlanets = G.planets.filter(p => p.owner === 'neutral');
  const playerPlanets = G.planets.filter(p => p.owner === 'player');
  const neutralAsteroids = G.asteroids.filter(a => a.owner === 'neutral');

  // Determine strategy
  if (enemyPlanets.length <= 2) G.aiStrategy = 'EXPAND';
  else if (playerPlanets.length > 3) G.aiStrategy = 'ATTACK';
  else G.aiStrategy = 'DEFEND';

  document.getElementById('ai-strategy').textContent = G.aiStrategy;

  enemyPlanets.forEach(ep => {
    // Build ships
    if (ep.shipyard && ep.buildQueue.length < 2) {
      const metal = rnd(0, 1) > 0.4 ? 'Fighter' : 'Destroyer';
      ep.buildQueue.push({ type: metal, count: 1, elapsed: 0, total: SHIP_TYPES[metal].buildTime * 60 });
    }

    // Collect fleet
    const totalFleet = ep.orbitingFleets.reduce((s, fl) => s + shipCount(fl), 0);
    if (totalFleet < 3) return;

    let target = null;
    if (G.aiStrategy === 'EXPAND') {
      target = neutralPlanets[0] || neutralAsteroids[0];
    } else if (G.aiStrategy === 'ATTACK') {
      target = playerPlanets[Math.floor(Math.random() * playerPlanets.length)];
    } else {
      // Reinforce weaker enemy planet
      const weak = enemyPlanets.find(p => p !== ep && p.orbitingFleets.length === 0);
      target = weak || playerPlanets[0];
    }

    if (!target) return;

    // Launch fleet
    const fl = ep.orbitingFleets.shift();
    if (!fl) return;
    fl.traveling = true;
    fl.startX = ep.x; fl.startY = ep.y;
    fl.x = ep.x; fl.y = ep.y;
    fl.targetX = target.x; fl.targetY = target.y;
    fl.targetObj = target;
    fl.trail = [];
    G.fleets.push(fl);
  });
}

// ============================================================
// UI
// ============================================================
function shipCount(fl) {
  return Object.values(fl.ships).reduce((s, v) => s + v, 0);
}

function showNotif(msg, color = '#00cfff') {
  const c = document.getElementById('notif-container');
  const el = document.createElement('div');
  el.className = 'notif';
  el.textContent = msg;
  el.style.borderColor = color + '66';
  el.style.color = color;
  c.appendChild(el);
  gsap.fromTo(el, { opacity: 0, y: -10 }, { opacity: 1, y: 0, duration: 0.3 });
  setTimeout(() => {
    gsap.to(el, { opacity: 0, y: -10, duration: 0.3, onComplete: () => el.remove() });
  }, 2800);
}

function showSendBanner() {
  const b = document.getElementById('send-mode-banner');
  b.style.display = 'block';
  gsap.fromTo(b, { opacity: 0 }, { opacity: 1, duration: 0.3 });
}

function hideSendBanner() {
  const b = document.getElementById('send-mode-banner');
  gsap.to(b, { opacity: 0, duration: 0.2, onComplete: () => b.style.display = 'none' });
}

function updateHUD() {
  document.getElementById('stat-planets').textContent = G.planets.filter(p => p.owner === 'player').length;
  document.getElementById('stat-asteroids').textContent = G.asteroids.filter(a => a.owner === 'player').length;
  document.getElementById('stat-fleets').textContent = G.fleets.filter(f => f.owner === 'player').length;
  document.getElementById('stat-stations').textContent = G.planets.filter(p => p.owner === 'player').reduce((s, p) => s + p.defenseStations.length, 0);
  document.getElementById('res-metal').textContent = Math.floor(G.playerMetal);
  document.getElementById('res-crystal').textContent = Math.floor(G.playerCrystal);
  document.getElementById('res-missiles').textContent = G.playerMissiles;
}

  const obj = G.selectedObj;
  const panel = document.getElementById('info-panel');
  const content = document.getElementById('info-content');
  if (!obj) { panel.classList.remove('visible'); return; }
  panel.classList.add('visible');

  const oc = ownerColor(obj.owner);
  const ownerLabel = obj.owner.toUpperCase();
  let html = `<h3 style="color:${oc}">${obj.name}</h3>
    <div class="owner-tag" style="color:${oc}">${ownerLabel}</div>`;

  if (obj.type === 'planet') {
    html += `<div class="info-section">
      <h4>PLANET STATS</h4>
      <div class="info-row"><span class="lbl">Population</span><span class="val">${Math.floor(obj.population)}</span></div>
      <div class="info-row"><span class="lbl">Defenses</span><span class="val">${Math.floor(obj.defenses)}</span></div>
      <div class="info-row"><span class="lbl">Metal</span><span class="val" style="color:#a0c4ff">${Math.floor(obj.metal)}</span></div>
      <div class="info-row"><span class="lbl">Crystal</span><span class="val" style="color:#da77ff">${Math.floor(obj.crystal)}</span></div>
      <div class="info-row"><span class="lbl">Metal/turn</span><span class="val">+${obj.metalRate}</span></div>
      <div class="info-row"><span class="lbl">Warp Gate</span><span class="val">${obj.warpGate ? '✓' : '—'}</span></div>
      <div class="info-row"><span class="lbl">Stations</span><span class="val">${obj.defenseStations.length}</span></div>
      <div class="info-row"><span class="lbl">Missiles</span><span class="val">${obj.missileStock || 0}</span></div>
    </div>`;

    html += `<div class="info-section">
      <h4>ORBITING FLEETS (${obj.orbitingFleets.length})</h4>
      ${obj.orbitingFleets.map(fl => {
        const c2 = ownerColor(fl.owner);
        return `<div class="info-row"><span class="lbl" style="color:${c2}">${fl.owner}</span><span class="val">${shipCount(fl)} ships</span></div>`;
      }).join('')}
    </div>`;

    if (obj.owner === 'player') {
      html += `<div class="info-section" id="build-section">
        <h4>BUILD SHIPS</h4>
        <div>${Object.entries(SHIP_TYPES).map(([name, s]) => {
          const canAfford = G.playerMetal >= s.cost.metal && G.playerCrystal >= s.cost.crystal;
          return `<button class="build-btn" ${!canAfford ? 'disabled' : ''} onclick="buildShip('${obj.id}','${name}')">
            ${s.icon} ${name} (${s.cost.metal}M ${s.cost.crystal}C)</button>`;
        }).join('')}
        <button class="build-btn" onclick="buildStation('${obj.id}')" ${G.playerMetal < 200 || G.playerCrystal < 150 ? 'disabled' : ''}>
          ⬡ Station (200M 150C)</button>
        </div>
      </div>`;

      html += `<div class="info-section">
        <h4>BUILD QUEUE (${obj.buildQueue.length})</h4>
        ${obj.buildQueue.map(bq => {
          const pct = Math.min(100, Math.floor((bq.elapsed / bq.total) * 100));
          return `<div class="queue-item">
            <span>${bq.type}</span><span>${pct}%</span>
          </div>
          <div class="queue-progress"><div class="queue-prog-fill" style="width:${pct}%"></div></div>`;
        }).join('')}
      </div>`;

      // Fleet controls
      html += `<div class="info-section">
        <h4>FLEET ACTIONS</h4>
        <div id="fleet-controls">
          <button class="fleet-btn" onclick="game.selectMode='sendfleet'; game.sourcePlanet='${obj.id}'; showSendBanner()">
            <i class="fas fa-rocket"></i> Send Fleet</button>
          <button class="fleet-btn" onclick="game.selectMode='mine'; game.sourcePlanet='${obj.id}'; showNotif('Select asteroid','#a0c4ff')">
            <i class="fas fa-hammer"></i> Mine</button>
          <button class="fleet-btn fire-btn" onclick="game.selectMode='missile'; game.sourcePlanet='${obj.id}'">
            <i class="fas fa-bomb"></i> Fire Missile</button>
          <button class="fleet-btn" onclick="buildWarpGate('${obj.id}')">
            <i class="fas fa-circle-nodes"></i> Warp Gate</button>
        </div>
      </div>`;
    }
  } else if (obj.type === 'asteroid') {
    html += `<div class="info-section">
      <h4>ASTEROID STATS</h4>
      <div class="info-row"><span class="lbl">Metal</span><span class="val" style="color:#a0c4ff">${Math.floor(obj.metal)}</span></div>
      <div class="info-row"><span class="lbl">Crystal</span><span class="val" style="color:#da77ff">${Math.floor(obj.crystal)}</span></div>
      <div class="info-row"><span class="lbl">Mining</span><span class="val">${obj.isMining ? '⚙ Active' : '—'}</span></div>
    </div>`;

    if (obj.owner !== 'enemy') {
      html += `<div class="info-section">
        <h4>ACTIONS</h4>
        <button class="build-btn" onclick="instantMine(G.asteroids.find(a=>a.id==='${obj.id}'))">
          ⚡ Instant Mine</button>
        <button class="build-btn" onclick="initSendMiner('${obj.id}')">
          ◉ Send Miners</button>
      </div>`;
    }
  } else if (obj.type === 'fleet') {
    html += `<div class="info-section">
      <h4>FLEET COMPOSITION</h4>
      ${Object.entries(obj.ships).map(([k, v]) => {
        const st = SHIP_TYPES[k];
        return `<div class="info-row">
          <span class="lbl">${st?.icon || '◈'} ${k}</span>
          <span class="val">${v}</span>
        </div>
        <div class="bar-wrap"><div class="bar-fill health" style="width:${Math.min(100, v * 20)}%"></div></div>`;
      }).join('')}
    </div>`;
  }

  content.innerHTML = html;
}

function buildShip(planetId, type) {
  const pl = G.planets.find(p => p.id === planetId);
  if (!pl) return;
  const stats = SHIP_TYPES[type];
  if (G.playerMetal < stats.cost.metal || G.playerCrystal < stats.cost.crystal) {
    showNotif('Not enough resources!', '#ff3355'); return;
  }
  G.playerMetal -= stats.cost.metal;
  G.playerCrystal -= stats.cost.crystal;
  pl.buildQueue.push({ type, count: 1, elapsed: 0, total: stats.buildTime * 60 });
  showNotif(`Building ${type}...`, '#00cfff');
  renderInfoPanel();
}

function buildStation(planetId) {
  const pl = G.planets.find(p => p.id === planetId);
  if (!pl) return;
  if (G.playerMetal < 200 || G.playerCrystal < 150) { showNotif('Not enough resources!', '#ff3355'); return; }
  G.playerMetal -= 200; G.playerCrystal -= 150;
  pl.buildQueue.push({ type: 'DefenseStation', count: 1, elapsed: 0, total: 25 * 60 });
  showNotif('Building defense station...', '#7b2fff');
}

function buildWarpGate(planetId) {
  const pl = G.planets.find(p => p.id === planetId);
  if (!pl || pl.warpGate) { showNotif('Already has warp gate!', '#ff9900'); return; }
  if (G.playerMetal < 350 || G.playerCrystal < 250) { showNotif('Not enough resources!', '#ff3355'); return; }
  G.playerMetal -= 350; G.playerCrystal -= 250;
  pl.warpGate = true;
  showNotif('Warp gate constructed!', '#7b2fff');
  renderInfoPanel();
}

function initSendMiner(asteroidId) {
  const ast = G.asteroids.find(a => a.id === asteroidId);
  if (!ast) return;
  const playerPlanets = G.planets.filter(p => p.owner === 'player' && p.orbitingFleets.some(f => f.ships.Miner > 0));
  if (!playerPlanets.length) { showNotif('No miner fleets available!', '#ff9900'); return; }
  sendMinerFleet(playerPlanets[0], ast);
}

window.buildShip = buildShip;
window.buildStation = buildStation;
window.buildWarpGate = buildWarpGate;
window.initSendMiner = initSendMiner;
window.instantMine = instantMine;
window.G = G;
window.showSendBanner = showSendBanner;
window.showNotif = showNotif;

// ============================================================
// CLICK HANDLING
// ============================================================
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Check planets
  for (const pl of G.planets) {
    if (Math.hypot(mx - pl.x, my - pl.y) < pl.radius + 10) {
      handleObjectClick(pl, mx, my);
      return;
    }
  }
  // Check asteroids
  for (const ast of G.asteroids) {
    if (Math.hypot(mx - ast.x, my - ast.y) < ast.radius + 10) {
      handleObjectClick(ast, mx, my);
      return;
    }
  }
  // Check traveling fleets
  for (const fl of G.fleets) {
    if (fl.traveling && Math.hypot(mx - fl.x, my - fl.y) < 18) {
      G.selectedObj = fl;
      renderInfoPanel();
      return;
    }
  }
  // Nothing clicked
  if (G.selectMode === 'normal') {
    G.selectedObj = null;
    renderInfoPanel();
  }
});

function handleObjectClick(obj, mx, my) {
  if (G.selectMode === 'sendfleet') {
    // Send fleet from selected planet to obj
    const srcPl = G.planets.find(p => p.id === G.sourcePlanet) ||
                  G.planets.filter(p => p.owner === 'player' && p.orbitingFleets.length > 0)[0];
    if (srcPl && srcPl !== obj && srcPl.orbitingFleets.length > 0) {
      const fl = srcPl.orbitingFleets.shift();
      fl.traveling = true;
      fl.startX = srcPl.x; fl.startY = srcPl.y;
      fl.x = srcPl.x; fl.y = srcPl.y;
      fl.targetX = obj.x; fl.targetY = obj.y;
      fl.targetObj = obj;
      fl.trail = [];
      G.fleets.push(fl);
      showNotif(`Fleet en route to ${obj.name}`, '#00cfff');
    } else {
      showNotif('No fleet to send!', '#ff9900');
    }
    G.selectMode = 'normal';
    hideSendBanner();
  } else if (G.selectMode === 'mine') {
    if (obj.type === 'asteroid') {
      instantMine(obj);
    }
    G.selectMode = 'normal';
  } else if (G.selectMode === 'missile') {
    const srcPl = G.planets.find(p => p.id === G.sourcePlanet) ||
                  G.planets.filter(p => p.owner === 'player' && (p.missileStock || 0) > 0)[0];
    if (srcPl && srcPl.missileStock > 0) {
      srcPl.missileStock--;
      G.playerMissiles--;
      G.missiles.push({
        x: srcPl.x, y: srcPl.y,
        targetX: obj.x, targetY: obj.y,
        targetObj: obj,
        owner: 'player',
        trail: [],
      });
      showNotif('Missile launched!', '#ff9900');
    } else {
      showNotif('No missiles available!', '#ff3355');
    }
    G.selectMode = 'normal';
  } else if (G.selectMode === 'warpgate') {
    if (obj.type === 'planet' && obj.owner === 'player') {
      buildWarpGate(obj.id);
    }
    G.selectMode = 'normal';
  } else {
    G.selectedObj = obj;
    G.sourcePlanet = obj.id;
    renderInfoPanel();
    gsap.fromTo('#info-panel', { opacity: 0, x: 20 }, { opacity: 1, x: 0, duration: 0.25 });
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    G.selectMode = 'normal';
    G.selectedObj = null;
    hideSendBanner();
    renderInfoPanel();
  }
  if (e.key === 's' || e.key === 'S') {
    G.selectMode = 'sendfleet';
    showSendBanner();
  }
  if (e.key === 'm' || e.key === 'M') {
    G.selectMode = 'mine';
    showNotif('Select asteroid to mine', '#a0c4ff');
  }
  if (e.key === 'b' || e.key === 'B') {
    const pl = G.selectedObj;
    if (pl && pl.type === 'planet' && pl.owner === 'player') renderInfoPanel();
  }
});

// ============================================================
// SPEED CONTROL
// ============================================================
function setSpeed(v) {
  G.speed = v;
  document.querySelectorAll('.sp-btn').forEach(b => b.classList.remove('active'));
  const map = { 0.5: 'spd-half', 1: 'spd-1', 2: 'spd-2', 3: 'spd-3' };
  document.getElementById(map[v])?.classList.add('active');
}
window.setSpeed = setSpeed;

// ============================================================
// COLOR HELPERS
// ============================================================
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return [r, g, b];
}
function lighten(hex, amt) {
  const [r, g, b] = hexToRgb(hex);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}
function darken(hex, amt) {
  const [r, g, b] = hexToRgb(hex);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}

// ============================================================
// GAME LOOP
// ============================================================
const game = { selectMode: 'normal', sourcePlanet: null };
window.game = game;

// Proxy selectMode via game object into G
Object.defineProperty(game, 'selectMode', {
  get() { return G.selectMode; },
  set(v) { G.selectMode = v; }
});
Object.defineProperty(game, 'sourcePlanet', {
  get() { return G.sourcePlanet; },
  set(v) { G.sourcePlanet = v; }
});

let lastTime = 0;
let aiCooldown = 0;
const AI_INTERVAL = 8000; // ms

function gameLoop(ts) {
  if (G.gameOver) return;
  const dt = Math.min(ts - lastTime, 60);
  lastTime = ts;
  G.tick++;

  // Clear
  ctx.fillStyle = '#01020a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawNebula();
  drawStars(ts);

  // Update
  updateFleets(dt);
  updateMissiles(dt);
  updateDefenseStations(dt);
  updateResources(dt);
  updateBuildQueues(dt);

  // AI
  aiCooldown -= dt;
  if (aiCooldown <= 0) {
    runAI();
    aiCooldown = AI_INTERVAL;
  }

  // Draw
  drawAsteroids(ts);
  drawPlanets(ts);
  drawFleets(ts);
  drawMissiles(ts);
  drawExplosions();

  // HUD
  updateHUD();
  renderInfoPanel();

  // Check win/lose
  checkGameState();

  requestAnimationFrame(gameLoop);
}

function checkGameState() {
  const ePlanets = G.planets.filter(p => p.owner === 'enemy').length;
  const pPlanets = G.planets.filter(p => p.owner === 'player').length;
  if (ePlanets === 0 && !G.gameOver) {
    G.gameOver = true;
    showFinalScreen('VICTORY', '#00ff88');
  }
  if (pPlanets === 0 && !G.gameOver) {
    G.gameOver = true;
    showFinalScreen('DEFEAT', '#ff3355');
  }
}

function showFinalScreen(text, color) {
  const div = document.createElement('div');
  div.style.cssText = `position:fixed;top:0;left:0;right:0;bottom:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(1,2,10,0.92);z-index:1000;font-family:'Orbitron',monospace;`;
  div.innerHTML = `
    <div style="font-size:56px;font-weight:900;color:${color};
      text-shadow:0 0 30px ${color};letter-spacing:8px;margin-bottom:20px">${text}</div>
    <div style="color:#4a5f80;font-size:14px;letter-spacing:3px;margin-bottom:30px">
      STELLAR DOMINION</div>
    <button onclick="location.reload()" style="
      background:rgba(0,207,255,0.1);border:1px solid rgba(0,207,255,0.4);
      color:#00cfff;font-family:'Orbitron',monospace;font-size:12px;
      letter-spacing:3px;padding:12px 30px;border-radius:6px;cursor:pointer;">
      NEW GAME</button>`;
  document.body.appendChild(div);
  gsap.fromTo(div, { opacity: 0 }, { opacity: 1, duration: 1 });
}

// ============================================================
// INIT
// ============================================================
function init() {
  G.stars = generateStars(350);
  generatePlanets();
  generateAsteroids();
  spawnPlayerFleet();

  // Add a second player fleet on second planet
  const p2 = G.planets[1];
  const fl2 = createFleet('player', p2.x, p2.y, { Fighter: 2, Miner: 1 });
  p2.orbitingFleets.push(fl2);
  G.fleets.push(fl2);

  showNotif('Welcome, Commander. Galaxy awaits.', '#00cfff');
  setTimeout(() => showNotif('Click planets & asteroids to interact', '#a0c4ff'), 2000);

  requestAnimationFrame(gameLoop);
}

init();
